<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TripSync — AI Travel Builder</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f0f;color:#f5f5f5;height:100vh;display:flex;flex-direction:column;}
        .header{background:#1a1a1a;padding:0.8rem 1rem;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center;}
        h1{font-size:1.4rem;background:linear-gradient(135deg,#00a86b,#00d4ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .menu-btn{background:#2a2a2a;border:none;padding:0.4rem 0.8rem;border-radius:40px;cursor:pointer;color:white;font-size:0.8rem;}
        .main{flex:1;overflow-y:auto;padding:1rem;}
        .sidebar{width:280px;background:#0f0f0f;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.3s;position:fixed;z-index:200;height:100%;top:0;left:0;}
        .sidebar.open{transform:translateX(0);}
        .sidebar-header{padding:1rem;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;}
        .saved-list{flex:1;overflow-y:auto;padding:0.5rem;}
        .saved-item{background:#1a1a1a;border-radius:12px;padding:0.6rem;margin-bottom:0.5rem;cursor:pointer;}
        .saved-item .title{font-size:0.85rem;font-weight:500;}
        .saved-item .date{font-size:0.65rem;color:#888;}
        .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:150;display:none;}
        .overlay.active{display:block;}
        .prefs-card{background:#1a1a1a;border-radius:20px;padding:1rem;margin-bottom:1rem;}
        .prefs-title{color:#00a86b;font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.8rem;}
        select,.input-field{width:100%;padding:0.6rem;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:12px;color:white;font-size:0.9rem;margin-bottom:0.5rem;}
        .row{display:flex;gap:0.5rem;margin-bottom:0.5rem;}
        .row select,.row .input-field{flex:1;margin-bottom:0;}
        .amenities-grid{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.5rem;}
        .amenity-tag{background:#2a2a2a;border:1px solid #3a3a3a;padding:0.2rem 0.6rem;border-radius:40px;font-size:0.7rem;cursor:pointer;}
        .amenity-tag.active{background:#00a86b;border-color:#00a86b;}
        button.primary{background:#00a86b;width:100%;padding:0.7rem;border-radius:40px;border:none;color:white;font-weight:600;cursor:pointer;margin-top:0.5rem;}
        .result-card{background:#1a1a1a;border-radius:16px;padding:1rem;margin-bottom:1rem;border-left:4px solid #00a86b;}
        .share-buttons{display:flex;gap:0.3rem;flex-wrap:wrap;margin-top:0.5rem;}
        .share-btn{background:#2a2a2a;padding:0.3rem 0.6rem;border-radius:40px;font-size:0.65rem;cursor:pointer;border:none;color:white;}
        .chat-container{background:#1a1a1a;border-radius:16px;padding:0.8rem;margin-bottom:1rem;}
        .chat-message{padding:0.4rem 0.8rem;border-radius:16px;margin-bottom:0.4rem;max-width:85%;font-size:0.85rem;}
        .chat-user{background:#00a86b;color:white;margin-left:auto;text-align:right;}
        .chat-bot{background:#2a2a2a;}
        .chat-input{display:flex;gap:0.5rem;margin-top:0.5rem;}
        .chat-input input{flex:1;padding:0.5rem;border-radius:40px;border:1px solid #3a3a3a;background:#2a2a2a;color:white;}
        .chat-input button{background:#00a86b;border:none;padding:0.5rem 1rem;border-radius:40px;cursor:pointer;color:white;}
        @media(max-width:768px){.sidebar{width:85%;}}
    </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header"><strong>📁 Saved Trips</strong><button onclick="closeSidebar()" style="background:none;border:none;color:white;">✕</button></div>
    <div class="saved-list" id="saved-list"><div style="color:#666;text-align:center;padding:1rem;">No saved trips</div></div>
    <div style="padding:0.5rem;"><button onclick="clearAllSaved()" style="background:#8b0000;width:100%;padding:0.5rem;border-radius:40px;border:none;color:white;">Clear All</button></div>
</div>

<div class="header">
    <button class="menu-btn" onclick="toggleSidebar()">📋 My Trips</button>
    <h1>TripSync</h1>
    <button class="menu-btn" onclick="shareTrip()">📤 Share</button>
</div>

<div class="main">
    <!-- Flight -->
    <div class="prefs-card">
        <div class="prefs-title">✈️ FLIGHT</div>
        <div class="row">
            <select id="flight-class">
                <option value="economy">Economy</option>
                <option value="premium">Premium Economy</option>
                <option value="business">Business</option>
                <option value="first">First Class</option>
            </select>
            <select id="flight-priority">
                <option value="cheapest">💰 Cheapest</option>
                <option value="fastest">⏱️ Fastest</option>
                <option value="best">✨ Best</option>
            </select>
        </div>
    </div>

    <!-- Hotel -->
    <div class="prefs-card">
        <div class="prefs-title">🏨 HOTEL</div>
        <div class="row">
            <select id="hotel-rating">
                <option value="any">Any Rating</option>
                <option value="3">3★+</option>
                <option value="4">4★+</option>
                <option value="5">5★</option>
            </select>
        </div>
        <div class="amenities-grid" id="hotel-amenities">
            <span class="amenity-tag" data-amenity="pool">🏊 Pool</span>
            <span class="amenity-tag" data-amenity="spa">💆 Spa</span>
            <span class="amenity-tag" data-amenity="gym">💪 Gym</span>
            <span class="amenity-tag" data-amenity="beachfront">🏖️ Beachfront</span>
            <span class="amenity-tag" data-amenity="restaurant">🍽️ Restaurant</span>
        </div>
    </div>

    <!-- Car -->
    <div class="prefs-card">
        <div class="prefs-title">🚗 CAR (optional)</div>
        <div class="row">
            <select id="car-type">
                <option value="none">No car needed</option>
                <option value="economy">Economy</option>
                <option value="suv">SUV</option>
                <option value="minivan">Minivan</option>
            </select>
            <select id="car-transmission">
                <option value="automatic">Automatic</option>
                <option value="manual">Manual</option>
            </select>
        </div>
    </div>

    <!-- Trip Details -->
    <div class="prefs-card">
        <div class="prefs-title">📍 TRIP DETAILS</div>
        <div class="row">
            <input type="text" id="from-city" placeholder="From (e.g., Toronto)" class="input-field">
            <input type="text" id="to-city" placeholder="To (e.g., Cancun)" class="input-field">
        </div>
        <div class="row">
            <input type="date" id="depart-date" class="input-field">
            <input type="date" id="return-date" class="input-field">
        </div>
        <input type="number" id="travelers" value="2" min="1" class="input-field" placeholder="Travelers">
        <button class="primary" id="search-btn">✨ Find My Trip</button>
    </div>

    <!-- AI Chat -->
    <div class="chat-container">
        <div id="chat-messages"><div class="chat-message chat-bot">🤖 Set your preferences, then click Find My Trip!</div></div>
        <div class="chat-input"><input type="text" id="chat-input" placeholder="Ask me anything..."><button id="chat-send">Send</button></div>
    </div>

    <div id="results"></div>
</div>

<script>
    function getPrefs() {
        return {
            flightClass: document.getElementById('flight-class').value,
            flightPriority: document.getElementById('flight-priority').value,
            hotelRating: document.getElementById('hotel-rating').value,
            carType: document.getElementById('car-type').value,
            carTransmission: document.getElementById('car-transmission').value,
            fromCity: document.getElementById('from-city').value,
            toCity: document.getElementById('to-city').value,
            departDate: document.getElementById('depart-date').value,
            returnDate: document.getElementById('return-date').value,
            travelers: parseInt(document.getElementById('travelers').value) || 2
        };
    }

    // Set default dates
    const today = new Date();
    const depart = new Date(today); depart.setDate(today.getDate() + 60);
    const ret = new Date(depart); ret.setDate(ret.getDate() + 7);
    document.getElementById('depart-date').value = depart.toISOString().split('T')[0];
    document.getElementById('return-date').value = ret.toISOString().split('T')[0];

    // Amenity toggles
    let selectedAmenities = [];
    document.querySelectorAll('.amenity-tag').forEach(tag => {
        tag.onclick = () => {
            let amenity = tag.dataset.amenity;
            if(selectedAmenities.includes(amenity)) {
                selectedAmenities = selectedAmenities.filter(a => a !== amenity);
                tag.classList.remove('active');
            } else {
                selectedAmenities.push(amenity);
                tag.classList.add('active');
            }
        };
    });

    function addAIMessage(msg, sender = 'bot') {
        let container = document.getElementById('chat-messages');
        let div = document.createElement('div');
        div.className = `chat-message chat-${sender}`;
        div.innerHTML = sender === 'bot' ? `🤖 ${msg}` : msg;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function searchTrip() {
        let prefs = getPrefs();
        if(!prefs.fromCity || !prefs.toCity) {
            alert('Please enter both From and To cities');
            return;
        }
        
        addAIMessage(`Searching for ${prefs.fromCity} to ${prefs.toCity}...`, 'bot');
        document.getElementById('results').innerHTML = '<div style="text-align:center;padding:2rem;">🔍 Finding real flights and hotels...</div>';
        
        let googleFlightsUrl = `https://www.google.com/travel/flights?q=Flights%20from%20${encodeURIComponent(prefs.fromCity)}%20to%20${encodeURIComponent(prefs.toCity)}%20on%20${prefs.departDate}`;
        let bookingUrl = `https://www.awin1.com/cread.php?awinmid=6776&awinaffid=2884913&ued=https%3A%2F%2Fwww.booking.com%2Fsearchresults.html%3Fss%3D${encodeURIComponent(prefs.toCity)}%26checkin%3D${prefs.departDate}%26checkout%3D${prefs.returnDate}`;
        
        let carText = '';
        if(prefs.carType !== 'none') {
            carText = `<div class="result-card"><strong>🚗 CAR RENTAL</strong><br>${prefs.carType.toUpperCase()} • ${prefs.carTransmission}<br><a href="https://www.discovercars.com/search?location=${encodeURIComponent(prefs.toCity)}" target="_blank" style="color:#00a86b;">Search car rentals →</a></div>`;
        }
        
        document.getElementById('results').innerHTML = `
            <div class="result-card"><strong>✈️ FLIGHTS</strong><br>${prefs.fromCity} → ${prefs.toCity}<br><a href="${googleFlightsUrl}" target="_blank" style="color:#00a86b;">Search flights on Google →</a></div>
            <div class="result-card"><strong>🏨 HOTELS</strong><br>In ${prefs.toCity}<br><a href="${bookingUrl}" target="_blank" style="color:#00a86b;">Search hotels on Booking.com →</a></div>
            ${carText}
            <button class="primary" onclick="saveCurrentTrip()">💾 Save This Trip</button>
            <div class="share-buttons">
                <button class="share-btn" onclick="shareTo('whatsapp')">💬 WhatsApp</button>
                <button class="share-btn" onclick="shareTo('twitter')">𝕏 Twitter</button>
                <button class="share-btn" onclick="shareTo('facebook')">📘 Facebook</button>
                <button class="share-btn" onclick="shareTo('instagram')">📸 Instagram</button>
                <button class="share-btn" onclick="shareTo('snapchat')">👻 Snapchat</button>
                <button class="share-btn" onclick="shareTo('email')">✉️ Email</button>
                <button class="share-btn" onclick="copyLink()">🔗 Copy Link</button>
            </div>
        `;
    }

    function saveCurrentTrip() {
        let prefs = getPrefs();
        let tripData = { prefs: prefs, savedAt: new Date().toISOString() };
        let saved = JSON.parse(localStorage.getItem('tripsync_saved') || '[]');
        let name = prompt('Name this trip:', `${prefs.fromCity} → ${prefs.toCity}`);
        if(name) {
            saved.push({ name, data: tripData });
            localStorage.setItem('tripsync_saved', JSON.stringify(saved));
            renderSavedList();
            alert('Trip saved!');
        }
    }

    function renderSavedList() {
        let saved = JSON.parse(localStorage.getItem('tripsync_saved') || '[]');
        let container = document.getElementById('saved-list');
        if(saved.length === 0) {
            container.innerHTML = '<div style="color:#666;text-align:center;padding:1rem;">No saved trips</div>';
            return;
        }
        container.innerHTML = saved.map((t, i) => `
            <div class="saved-item" onclick="loadTrip(${i})">
                <div class="title">${t.name}</div>
                <div class="date">${new Date(t.data.savedAt).toLocaleDateString()}</div>
            </div>
        `).join('');
    }

    function loadTrip(idx) {
        let saved = JSON.parse(localStorage.getItem('tripsync_saved') || '[]');
        let trip = saved[idx];
        if(trip.data.prefs) {
            let p = trip.data.prefs;
            document.getElementById('from-city').value = p.fromCity;
            document.getElementById('to-city').value = p.toCity;
            document.getElementById('depart-date').value = p.departDate;
            document.getElementById('return-date').value = p.returnDate;
            document.getElementById('travelers').value = p.travelers;
            document.getElementById('flight-class').value = p.flightClass;
            document.getElementById('flight-priority').value = p.flightPriority;
            document.getElementById('hotel-rating').value = p.hotelRating;
            document.getElementById('car-type').value = p.carType;
            document.getElementById('car-transmission').value = p.carTransmission;
        }
        closeSidebar();
        searchTrip();
    }

    function clearAllSaved() { localStorage.removeItem('tripsync_saved'); renderSavedList(); alert('Cleared'); }
    function toggleSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('active'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }

    function shareTo(platform) {
        let url = window.location.href;
        let prefs = getPrefs();
        let text = `Check out my trip from ${prefs.fromCity} to ${prefs.toCity} on TripSync! Plan yours at TripSync!`;
        let finalUrl = '';
        switch(platform) {
            case 'whatsapp': finalUrl = `https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`; break;
            case 'twitter': finalUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`; break;
            case 'facebook': finalUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`; break;
            case 'instagram': alert('📸 Instagram: Take a screenshot of your trip and share it! Tag @tripsync'); return;
            case 'snapchat': alert('👻 Snapchat: Take a screenshot of your trip and share it!'); return;
            case 'email': finalUrl = `mailto:?subject=My TripSync Trip&body=${encodeURIComponent(text + '\n\n' + url)}`; break;
            default: return;
        }
        if(finalUrl) window.open(finalUrl, '_blank');
    }

    function copyLink() { navigator.clipboard.writeText(window.location.href); alert('Link copied!'); }
    function shareTrip() { copyLink(); }

    document.getElementById('search-btn').onclick = searchTrip;
    document.getElementById('chat-send').onclick = () => {
        let input = document.getElementById('chat-input');
        let msg = input.value.trim();
        if(msg) {
            addAIMessage(msg, 'user');
            input.value = '';
            setTimeout(() => addAIMessage(`Thanks! Adjust your preferences above and click Find My Trip for real flight and hotel options.`, 'bot'), 500);
        }
    };

    renderSavedList();
</script>
</body>
</html>
